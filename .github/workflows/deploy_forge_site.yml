name: Deploy FORGE Site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "site_backend/**"
      - "tools/deploy_hostinger_site.py"
      - ".github/workflows/deploy_forge_site.yml"
  workflow_dispatch:

jobs:
  portal-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . cryptography

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Portal UI smoke tests
        run: npm run test:portal

      - name: Run Desktop onboarding smoke tests
        run: npm run test:desktop-auth

  deploy-site:
    needs: portal-ui
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deploy dependency
        run: python -m pip install --upgrade pip paramiko

      - name: Deploy FORGE site bundle to Hostinger
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_REMOTE_ROOT: ${{ secrets.HOSTINGER_REMOTE_ROOT }}
        run: python tools/deploy_hostinger_site.py
