name: Release FORGE Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update (example: v1.1.4)"
        required: true
        default: "v1.1.4"
      prerelease:
        description: "Mark the GitHub release as prerelease"
        required: false
        default: "false"
  push:
    tags:
      - "v*"

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . cryptography

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Compile Python modules
        run: python -m compileall forge site_backend

      - name: Run portal tests
        run: npm run test:portal

      - name: Run desktop onboarding tests
        run: npm run test:desktop-auth

  build-windows:
    needs: qa
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      RELEASE_PRERELEASE: ${{ github.event.inputs.prerelease || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -e . pyinstaller pillow cryptography

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          echo "ISCC_EXE=C:\Program Files (x86)\Inno Setup 6\ISCC.exe" >> $env:GITHUB_ENV

      - name: Build Windows desktop binary
        run: python tools/build_windows_desktop.py

      - name: Build Windows installer
        run: python tools/build_windows_installer.py

      - name: Package release assets
        run: python tools/package_release_assets.py

      - name: Azure login for Artifact Signing
        if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_TRUSTED_SIGNING_ENDPOINT != '' && secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME != '' && secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows desktop artifact with Azure Artifact Signing
        if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_TRUSTED_SIGNING_ENDPOINT != '' && secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME != '' && secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE != '' }}
        uses: azure/artifact-signing-action@v1
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files: |
            ${{ github.workspace }}\dist\FORGE-Desktop.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign Windows installer artifact with Azure Artifact Signing
        if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_TRUSTED_SIGNING_ENDPOINT != '' && secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME != '' && secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE != '' }}
        uses: azure/artifact-signing-action@v1
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}\release-assets\installer-output
          files-folder-filter: FORGE-Setup-*.exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign Windows artifacts
        if: ${{ (secrets.AZURE_CLIENT_ID == '' || secrets.AZURE_TENANT_ID == '' || secrets.AZURE_SUBSCRIPTION_ID == '' || secrets.AZURE_TRUSTED_SIGNING_ENDPOINT == '' || secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME == '' || secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE == '') && secrets.WINDOWS_PFX_BASE64 != '' && secrets.WINDOWS_PFX_PASSWORD != '' }}
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $pfxPath = Join-Path $env:RUNNER_TEMP 'forge-signing-cert.pfx'
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String("${{ secrets.WINDOWS_PFX_BASE64 }}"))
          $signtool = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\App Certification Kit\signtool.exe'
          if (-not (Test-Path $signtool)) {
            $signtool = (Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          }
          if (-not (Test-Path $signtool)) {
            throw 'signtool.exe not found on runner.'
          }
          $targets = @(
            'dist\FORGE-Desktop.exe',
            (Get-ChildItem 'release-assets\installer-output\FORGE-Setup-*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          )
          foreach ($target in $targets) {
            & $signtool sign /f $pfxPath /p "${{ secrets.WINDOWS_PFX_PASSWORD }}" /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $target
          }

      - name: Compute SHA256
        id: hashes
        shell: powershell
        run: |
          $installer = Get-ChildItem 'release-assets\installer-output\FORGE-Setup-*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $desktop = Get-Item 'dist\FORGE-Desktop.exe'
          $installerHash = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash
          $desktopHash = (Get-FileHash -Algorithm SHA256 $desktop.FullName).Hash
          "installer_path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "installer_name=$($installer.Name)" >> $env:GITHUB_OUTPUT
          "installer_sha=$installerHash" >> $env:GITHUB_OUTPUT
          "desktop_path=$($desktop.FullName)" >> $env:GITHUB_OUTPUT
          "desktop_name=$($desktop.Name)" >> $env:GITHUB_OUTPUT
          "desktop_sha=$desktopHash" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-windows-release
          path: |
            dist/FORGE-Desktop.exe
            release-assets/installer-output/FORGE-Setup-*.exe
            release-assets/FORGE-Windows-Portable-*.zip
            release-assets/FORGE-Source-v*.zip
            release-assets/SHA256SUMS-*.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: FORGE ${{ env.RELEASE_TAG }}
          prerelease: ${{ env.RELEASE_PRERELEASE == 'true' }}
          generate_release_notes: true
          body: |
            Windows release artifacts for FORGE.

            SHA256
            - `${{ steps.hashes.outputs.desktop_name }}`: `${{ steps.hashes.outputs.desktop_sha }}`
            - `${{ steps.hashes.outputs.installer_name }}`: `${{ steps.hashes.outputs.installer_sha }}`
          files: |
            dist/FORGE-Desktop.exe
            ${{ steps.hashes.outputs.installer_path }}
            release-assets/FORGE-Windows-Portable-*.zip
            release-assets/FORGE-Source-v*.zip
            release-assets/SHA256SUMS-*.txt
